  <script>
  // Wombat animation, JS-driven.
  // Only the silhouette moves; the wordmark below it stays still.
  (function() {
    const wombat = document.getElementById('wombat-mark');
    if (!wombat) return;

    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

    let startTime = Date.now();
    let isHovering = false;

    wombat.addEventListener('mouseenter', () => isHovering = true);
    wombat.addEventListener('mouseleave', () => isHovering = false);

    function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
    function easeInOutQuad(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2; }

    function animate() {
      if (!isHovering) {
        const t = (Date.now() - startTime) / 1000;

        // BREATHING — gentle continuous pulse
        const breatheScale = 1 + 0.015 * Math.sin((t / 6) * Math.PI * 2);

        // SPRINT — every 22s, dash right with a bounce, pause, walk back
        const sprintCycle = t % 22;
        let sprintX = 0;
        let bounceY = 0;

        if (sprintCycle < 16) {
          sprintX = 0;
          bounceY = 0;
        } else if (sprintCycle < 16.8) {
          // Quick dash (0.8s) — runs and bounces
          const p = (sprintCycle - 16) / 0.8;
          sprintX = easeOutCubic(p) * 10; // 10% to the right
          // Two bounces during the dash
          bounceY = -Math.abs(Math.sin(p * Math.PI * 2)) * 4;
        } else if (sprintCycle < 18) {
          // Pause at the right
          sprintX = 10;
          bounceY = 0;
        } else {
          // Slow walk back (4s) — gentle bobs
          const p = (sprintCycle - 18) / 4;
          sprintX = 10 * (1 - easeInOutQuad(p));
          // Subtle bobs while walking, ~3 steps
          bounceY = -Math.abs(Math.sin(p * Math.PI * 3)) * 2;
        }

        // LOOK AROUND — every 35s, brief leftward glance
        const lookCycle = t % 35;
        let lookX = 0;
        if (lookCycle > 25 && lookCycle < 30) {
          const p = (lookCycle - 25) / 5;
          lookX = -3 * Math.sin(p * Math.PI);
        }

        const totalX = sprintX + lookX;
        wombat.style.transform =
          `translateX(${totalX}%) translateY(${bounceY}px) scale(${breatheScale})`;
      }

      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  })();
  </script>
</body>
